name: Run on cloud (CPU)
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario name (key in scenarios.json)"
        required: true
        default: "example"
        type: string
      stop_days:
        description: "Simulation duration in days"
        required: false
        default: "365"
        type: string

env:
  PROJECT_ID: nivatest-1 # Your GCP project
  REGION: europe-west1 # Batch region (not zone)
  IMAGE_NAME: gcp-chem-sim-private # Image name
  IMAGE_REPO: europe-west1-docker.pkg.dev/niva-cd/jobs/gcp-chem-sim-private
  ARCH: cpu

jobs:
  verify-inputs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Verify scenario inputs exist in GCS
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          BUCKET="oceananigans-nivatest-1"
          PREFIX="input"

          # Parse required files from scenarios.json
          if ! jq -e --arg s "$SCENARIO" '.[$s]' scenarios.json > /dev/null 2>&1; then
            echo "ERROR: scenario '${SCENARIO}' not found in scenarios.json"
            exit 1
          fi

          GRID_FILE=$(jq -r --arg s "$SCENARIO" '.[$s].grid_file' scenarios.json)
          FORCING_FILE=$(jq -r --arg s "$SCENARIO" '.[$s].forcing_file' scenarios.json)
          ATM_DIR=$(jq -r --arg s "$SCENARIO" '.[$s].atmospheric_forcing_dir' scenarios.json)

          MISSING=0
          for FILE in "$GRID_FILE" "$FORCING_FILE"; do
            if ! gsutil -q stat "gs://${BUCKET}/${PREFIX}/${FILE}"; then
              echo "ERROR: missing gs://${BUCKET}/${PREFIX}/${FILE}"
              MISSING=1
            else
              echo "OK: gs://${BUCKET}/${PREFIX}/${FILE}"
            fi
          done

          # Check atmosphere directory has at least one file
          COUNT=$(gsutil ls "gs://${BUCKET}/${PREFIX}/${ATM_DIR}/" 2>/dev/null | wc -l || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: no files in gs://${BUCKET}/${PREFIX}/${ATM_DIR}/"
            MISSING=1
          else
            echo "OK: gs://${BUCKET}/${PREFIX}/${ATM_DIR}/ (${COUNT} files)"
          fi

          if [ "$MISSING" -ne 0 ]; then
            echo "Aborting: required input files are missing from GCS."
            exit 1
          fi
          echo "All required inputs verified."

  build-and-push:
    needs: verify-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest: ${{ steps.docker_push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SA }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: docker_push
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: ${{ steps.meta.outputs.tags }}

  run-batch:
    needs: [verify-inputs, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.WORKLOAD_IDENTITY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Render actual Batch job config from template
        run: |
          IMAGE_URI="${IMAGE_REPO}@${{ needs.build-and-push.outputs.image_digest }}"
          SCENARIO="${{ github.event.inputs.scenario }}"
          STOP_DAYS="${{ github.event.inputs.stop_days }}"
          sed -e "s|IMAGE_URI_PLACEHOLDER|${IMAGE_URI}|g" \
              -e "s|SCENARIO_PLACEHOLDER|${SCENARIO}|g" \
              -e "s|STOP_DAYS_PLACEHOLDER|${STOP_DAYS}|g" \
              .github/batch/cpu-batch-job-conf.yaml > batch-job.yaml
          echo "Rendered batch-job.yaml:"
          cat batch-job.yaml
          # Safety guard
          grep -q "imageUri:" batch-job.yaml || { echo "ERROR: imageUri not set"; exit 1; }

      - name: Debug gcloud identity
        run: |
          echo "Active gcloud account:"
          gcloud auth list
          echo
          echo "Config:"
          gcloud config list

      - name: Submit Cloud Batch job
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SCENARIO="${{ github.event.inputs.scenario }}"
          # Sanitize: lowercase, replace illegal chars with hyphens, collapse
          # repeated hyphens, strip leading/trailing hyphens, truncate to 63 chars
          JOB_NAME=$(echo "dto-$ARCH-$BRANCH_NAME-$SCENARIO-${{ github.run_number }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-63)
          echo "Submitting Batch job: $JOB_NAME"

          gcloud batch jobs submit "$JOB_NAME" \
            --project="$PROJECT_ID" \
            --location="$REGION" \
            --config=batch-job.yaml

          echo "Batch job submitted to project: $PROJECT_ID"
